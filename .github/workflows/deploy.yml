name: Deploy to GCP

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Run DB migrations
        run: |
          gcloud run jobs execute gulfstream-migrate \
            --region ${{ secrets.GCP_REGION }} \
            --wait \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy backend
        run: |
          gcloud run services update gulfstream-backend \
            --image ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/apps/backend:${{ github.sha }} \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy frontend
        run: |
          gcloud run services update gulfstream-frontend \
            --image ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/apps/frontend:${{ github.sha }} \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Verify deployment
        run: |
          BACKEND_URL=$(gcloud run services describe gulfstream-backend --region ${{ secrets.GCP_REGION }} --format 'value(status.url)')
          curl -sf "$BACKEND_URL/api/v1/health" | jq .
