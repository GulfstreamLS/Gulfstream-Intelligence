name: Deploy Backend to GCP

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID_SECRET: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION_SECRET: ${{ secrets.GCP_REGION }}
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Prepare GCP values
        run: |
          PROJECT_ID="$(printf '%s' "$GCP_PROJECT_ID_SECRET" | tr -d '[:space:]')"
          REGION="$(printf '%s' "$GCP_REGION_SECRET" | tr -d '[:space:]')"

          if [ -z "$PROJECT_ID" ] || [ -z "$REGION" ]; then
            echo "GCP_PROJECT_ID and GCP_REGION secrets must both be set."
            exit 1
          fi

          echo "GCP_PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"
          echo "GCP_REGION=$REGION" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=$REGION-docker.pkg.dev/$PROJECT_ID/apps/backend:${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_ENV"

      - name: Deploy backend
        run: |
          gcloud run deploy gulfstream-backend \
            --image "$BACKEND_IMAGE" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID" \
            --platform managed \
            --allow-unauthenticated \
            --port 8000

      - name: Verify deployment
        run: |
          BACKEND_URL=$(gcloud run services describe gulfstream-backend \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID" \
            --format 'value(status.url)')
          curl -sf "$BACKEND_URL/api/v1/health" | jq .
