name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gulfstream_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
        working-directory: backend
      - name: Lint
        run: python -m ruff check .
        working-directory: backend
      - name: Type check
        run: python -m mypy app
        working-directory: backend
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/gulfstream_test
          SECRET_KEY: test-secret-key
        run: pytest
        working-directory: backend

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
        working-directory: frontend
      - name: Type check
        run: npm run type-check
        working-directory: frontend
      - name: Lint
        run: npm run lint
        working-directory: frontend
      - name: Test
        run: npm test
        working-directory: frontend

  build-backend-image:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID_SECRET: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION_SECRET: ${{ secrets.GCP_REGION }}
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Prepare GCP values
        run: |
          PROJECT_ID="$(printf '%s' "$GCP_PROJECT_ID_SECRET" | tr -d '[:space:]')"
          REGION="$(printf '%s' "$GCP_REGION_SECRET" | tr -d '[:space:]')"

          if [ -z "$PROJECT_ID" ] || [ -z "$REGION" ]; then
            echo "GCP_PROJECT_ID and GCP_REGION secrets must both be set."
            exit 1
          fi

          echo "GCP_PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"
          echo "GCP_REGION=$REGION" >> "$GITHUB_ENV"
          echo "GAR_REGISTRY=$REGION-docker.pkg.dev" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=$REGION-docker.pkg.dev/$PROJECT_ID/gulfstream-repo/backend:$GITHUB_SHA" >> "$GITHUB_ENV"
      - run: gcloud auth configure-docker "$GAR_REGISTRY" --quiet
      - name: Build & push backend
        run: |
          docker build -t "$BACKEND_IMAGE" ./backend
          docker push "$BACKEND_IMAGE"
