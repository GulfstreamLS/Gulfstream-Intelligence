name: Deploy Frontend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-frontend:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID_SECRET: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION_SECRET: ${{ secrets.GCP_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: frontend

      - name: Type check
        run: npm run type-check
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Test
        run: npm test
        working-directory: frontend

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Prepare GCP values
        run: |
          PROJECT_ID="$(printf '%s' "$GCP_PROJECT_ID_SECRET" | tr -d '[:space:]')"
          REGION="$(printf '%s' "$GCP_REGION_SECRET" | tr -d '[:space:]')"

          if [ -z "$PROJECT_ID" ] || [ -z "$REGION" ]; then
            echo "GCP_PROJECT_ID and GCP_REGION secrets must both be set."
            exit 1
          fi

          echo "GCP_PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"
          echo "GCP_REGION=$REGION" >> "$GITHUB_ENV"
          echo "GAR_REGISTRY=$REGION-docker.pkg.dev" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=$REGION-docker.pkg.dev/$PROJECT_ID/apps/frontend:$GITHUB_SHA" >> "$GITHUB_ENV"

      - name: Configure Docker
        run: gcloud auth configure-docker "$GAR_REGISTRY" --quiet

      - name: Build and push frontend image
        run: |
          docker build --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_API_URL=https://gulfstream-backend-y7fj7rtwsa-uc.a.run.app/api/v1 \
            --build-arg BACKEND_URL=https://gulfstream-backend-y7fj7rtwsa-uc.a.run.app \
            -t "$FRONTEND_IMAGE" ./frontend
          docker push "$FRONTEND_IMAGE"

      - name: Deploy frontend
        run: |
          gcloud run deploy gulfstream-frontend \
            --image "$FRONTEND_IMAGE" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars BACKEND_URL=https://gulfstream-backend-1046831687787.us-central1.run.app \
            --port 8080

      - name: Verify frontend
        run: |
          FRONTEND_URL=$(gcloud run services describe gulfstream-frontend \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID" \
            --format 'value(status.url)')
          curl -fsI "$FRONTEND_URL"
