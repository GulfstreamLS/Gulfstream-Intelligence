name: Backend Pipeline

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-pipeline.yml"
  workflow_dispatch:

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID_SECRET: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION_SECRET: ${{ secrets.GCP_REGION }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Prepare GCP values
        run: |
          PROJECT_ID="$(printf '%s' "$GCP_PROJECT_ID_SECRET" | tr -d '[:space:]')"
          REGION="$(printf '%s' "$GCP_REGION_SECRET" | tr -d '[:space:]')"

          if [ -z "$PROJECT_ID" ] || [ -z "$REGION" ]; then
            echo "GCP_PROJECT_ID and GCP_REGION secrets must both be set."
            exit 1
          fi

          echo "GCP_PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"
          echo "GCP_REGION=$REGION" >> "$GITHUB_ENV"
          echo "GAR_REGISTRY=$REGION-docker.pkg.dev" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=$REGION-docker.pkg.dev/$PROJECT_ID/gulfstream-repo/backend:$GITHUB_SHA" >> "$GITHUB_ENV"

      - name: Configure Docker
        run: gcloud auth configure-docker "$GAR_REGISTRY" --quiet

      - name: Build and Push Image
        run: |
          docker build --platform linux/amd64 -t "$BACKEND_IMAGE" ./backend
          docker push "$BACKEND_IMAGE"

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update gulfstream-backend \
            --image "$BACKEND_IMAGE" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID"

      - name: Verify Deployment
        run: |
          BACKEND_URL=$(gcloud run services describe gulfstream-backend \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID" \
            --format 'value(status.url)')
          echo "Backend URL: $BACKEND_URL"
          curl -sf "$BACKEND_URL/api/v1/health" || echo "Health check failed but deployment finished."
