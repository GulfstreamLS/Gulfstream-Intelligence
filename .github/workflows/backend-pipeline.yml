name: Backend Pipeline

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    # Removed environment: production to bypass manual approval blocks
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure Docker
        run: gcloud auth configure-docker "${{ secrets.GCP_REGION }}-docker.pkg.dev" --quiet
        
      - name: Build and Push Image
        run: |
          # Use secrets directly to avoid interpolation issues
          REGION="${{ secrets.GCP_REGION }}"
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          IMAGE_PATH="$REGION-docker.pkg.dev/$PROJECT_ID/gulfstream-repo/backend:${{ github.sha }}"
          
          docker build -t "$IMAGE_PATH" ./backend
          docker push "$IMAGE_PATH"
          echo "FINAL_IMAGE_PATH=$IMAGE_PATH" >> "$GITHUB_ENV"
          
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy gulfstream-backend \
            --image "$FINAL_IMAGE_PATH" \
            --region "${{ secrets.GCP_REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8000 \
            --set-env-vars "ENVIRONMENT=production,DATABASE_URL=${{ secrets.DATABASE_URL }},REDIS_URL=${{ secrets.REDIS_URL }},SECRET_KEY=${{ secrets.SECRET_KEY }},OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
            --timeout 300
            
      - name: Verify Deployment
        run: |
          BACKEND_URL=$(gcloud run services describe gulfstream-backend \
            --region "${{ secrets.GCP_REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --format 'value(status.url)')
          echo "Backend URL: $BACKEND_URL"
          curl -sf "$BACKEND_URL/api/v1/health" || echo "Health check failed but deployment finished."
