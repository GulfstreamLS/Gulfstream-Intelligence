[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["static_tests"]
norecursedirs = ["scripts", "venv", ".git"]
addopts = "--cov=app --cov-report=term-missing"

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
no_implicit_optional = false
disable_error_code = [
  "arg-type",
  "assignment",
  "attr-defined",
  "call-arg",
  "no-any-return",
  "no-untyped-call",
  "no-untyped-def",
  "override",
  "type-arg",
  "union-attr",
]
