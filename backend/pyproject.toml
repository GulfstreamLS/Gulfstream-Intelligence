[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["static_tests"]
norecursedirs = ["scripts", "venv", ".git"]
addopts = "--cov=app --cov-report=term-missing"

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
