<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regulatory Intelligence Assistant | Unified Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --critical: #ef4444;
            --high: #f59e0b;
            --medium: #3b82f6;
            --low: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 300px;
            background-color: rgba(30, 41, 59, 0.5);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
        }

        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 32px;
            transition: background 0.2s;
            cursor: pointer;
            border: none;
            width: 100%;
        }

        .new-chat-btn:hover {
            background-color: var(--primary-hover);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-item {
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s;
        }

        .history-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .history-item.active {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            font-weight: 500;
        }


        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 16px;
            font-weight: 600;
        }

        .authority-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        .authority-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .authority-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .authority-item.selected {
            background-color: rgba(139, 92, 246, 0.15);
            border-color: rgba(139, 92, 246, 0.3);
        }

        .authority-item input {
            cursor: pointer;
        }

        /* Chat Container */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #chat-feed {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        /* Message Bubbles */
        .message {
            max-width: 85%;
            padding: 16px 20px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 0.95rem;
            position: relative;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background-color: var(--card-bg);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        /* Analysis Bubble */
        .analysis-container {
            width: 100%;
            margin-top: 12px;
        }

        .auth-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .auth-tab {
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-dim);
            transition: all 0.2s;
        }

        .auth-tab.active {
            background-color: var(--primary);
            color: white;
        }

        .analysis-results {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .gap-card {
            background: rgba(15, 23, 42, 0.4);
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid var(--border);
        }

        .gap-card.critical { border-left-color: var(--critical); }
        .gap-card.high { border-left-color: var(--high); }
        .gap-card.medium { border-left-color: var(--medium); }
        .gap-card.low { border-left-color: var(--low); }

        .gap-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .gap-title {
            font-weight: 600;
            font-size: 1.05rem;
        }

        .severity-badge {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
        }

        /* Input Area */
        .input-area {
            padding: 24px 40px;
            background-color: var(--bg-dark);
            border-top: 1px solid var(--border);
        }

        .input-container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 12px 16px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-container:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }

        #chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            padding: 8px 0;
            resize: none;
            max-height: 200px;
        }

        .action-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-dim);
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        .action-btn.send {
            color: var(--primary);
        }

        .action-btn.send:hover {
            background-color: var(--primary);
            color: white;
        }

        /* Loading States */
        .typing {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-top: -12px;
            margin-left: 40px;
            display: none;
        }

        .pulse {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">Regulatory AI</div>
        
        <button class="new-chat-btn" onclick="startNewChat()">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            New Chat
        </button>

        <div class="section-title">History</div>
        <div class="history-list" id="history-list">
            <!-- Chat history will be loaded here -->
        </div>

        <div class="section-title">Regulatory Context</div>

        <div class="authority-list" id="auth-list">
            <!-- Authorities will be loaded here -->
            <div class="pulse" style="padding: 10px;">Loading authorities...</div>
        </div>

        <div style="margin-top: auto;">
            <div class="section-title">Current File</div>
            <div id="file-info" style="font-size: 0.85rem; color: var(--text-dim);">
                No document uploaded
            </div>
        </div>
    </div>

    <div class="chat-main">
        <div id="chat-feed">
            <div class="message assistant">
                Hello! I am your Regulatory Intelligence Assistant. <br><br>
                Please select one or more <b>Regulatory Authorities</b> from the sidebar and upload a document or ask a question to begin.
            </div>
        </div>
        
        <div class="typing" id="typing-indicator">Assistant is thinking...</div>

        <div class="input-area">
            <div id="pending-file" style="display: none; margin-bottom: 12px; background: rgba(139, 92, 246, 0.1); padding: 8px 16px; border-radius: 8px; border: 1px solid var(--primary); align-items: center; gap: 12px; width: fit-content;">
                <span id="pending-filename" style="font-size: 0.85rem; font-weight: 500;"></span>
                <button onclick="clearPendingFile()" style="background: none; border: none; color: var(--critical); cursor: pointer; display: flex;">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="input-container">
                <input type="file" id="file-upload" style="display: none;">
                <button class="action-btn" id="attach-btn">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </button>
                <textarea id="chat-input" placeholder="Ask a regulatory question or add a document..." rows="1"></textarea>
                <button class="action-btn send" id="send-btn">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8000/api/v1";
        let currentConversationId = null;
        let selectedAuthorities = [];
        let pendingFile = null;

        // 1. Initial Load
        async function init() {
            try {
                // Fetch History
                await loadHistory();

                const authRes = await fetch(`${API_BASE}/regulatory/authorities`);
                const authorities = await authRes.json();
                renderAuthorities(authorities);

                // If no active conversation, start a new one
                if(!currentConversationId) {
                    await startNewChat();
                }
            } catch (err) { console.error(err); }
        }

        async function loadHistory() {
            const res = await fetch(`${API_BASE}/chat/conversations`);
            const history = await res.json();
            const container = document.getElementById('history-list');
            container.innerHTML = '';
            
            history.forEach(convo => {
                const div = document.createElement('div');
                div.className = `history-item ${convo.id === currentConversationId ? 'active' : ''}`;
                div.innerText = convo.title || 'Untitled Chat';
                div.onclick = () => switchConversation(convo.id);
                container.appendChild(div);
            });
        }

        async function startNewChat() {
            const convoRes = await fetch(`${API_BASE}/chat/conversations`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: 'gpt-4o' })
            });
            const convo = await convoRes.json();
            currentConversationId = convo.id;
            
            // Reset UI
            document.getElementById('chat-feed').innerHTML = `
                <div class="message assistant">
                    Hello! I am your Regulatory Intelligence Assistant. <br><br>
                    Please select one or more <b>Regulatory Authorities</b> from the sidebar and upload a document or ask a question to begin.
                </div>
            `;
            document.getElementById('file-info').innerText = 'No document uploaded';
            clearPendingFile();
            await loadHistory();
        }

        async function switchConversation(id) {
            currentConversationId = id;
            
            const convoRes = await fetch(`${API_BASE}/chat/conversations/${id}`);
            const convo = await convoRes.json();
            
            // Update Authorities checkboxes
            const authorities = convo.authorities || [];
            document.querySelectorAll('.authority-item input').forEach(input => {
                input.checked = authorities.includes(input.value);
            });
            updateSelection(false); // Update UI but don't send PATCH back

            // Load messages
            const feed = document.getElementById('chat-feed');
            feed.innerHTML = '';
            
            convo.messages.forEach(msg => {
                if(msg.is_analysis) {
                    renderAnalysisBubble(msg.analysis_data);
                } else {
                    addMessageToFeed(msg.role, msg.content);
                }
            });

            // Update file info
            document.getElementById('file-info').innerText = convo.metadata?.last_uploaded_filename || 'No document uploaded';
            
            await loadHistory();
        }

        // Authority Logic
        function renderAuthorities(list) {
            const container = document.getElementById('auth-list');
            container.innerHTML = '';
            list.forEach(auth => {
                const div = document.createElement('div');
                div.className = 'authority-item';
                div.innerHTML = `<input type="checkbox" value="${auth}" id="check-${auth}"><label for="check-${auth}" style="cursor: pointer;">${auth}</label>`;
                div.onclick = (e) => {
                    if(e.target.tagName !== 'INPUT') {
                        const input = div.querySelector('input');
                        input.checked = !input.checked;
                    }
                    updateSelection();
                };
                container.appendChild(div);
            });
        }

        async function updateSelection(sendToBackend = true) {
            selectedAuthorities = Array.from(document.querySelectorAll('.authority-item input:checked')).map(i => i.value);
            document.querySelectorAll('.authority-item').forEach(div => {
                const input = div.querySelector('input');
                if(input.checked) div.classList.add('selected');
                else div.classList.remove('selected');
            });
            if(currentConversationId && sendToBackend) {
                await fetch(`${API_BASE}/chat/conversations/${currentConversationId}/authorities`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(selectedAuthorities)
                });
            }
        }


        // 2. Attachment Handling
        document.getElementById('attach-btn').onclick = () => document.getElementById('file-upload').click();
        document.getElementById('file-upload').onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            pendingFile = file;
            document.getElementById('pending-filename').innerText = file.name;
            document.getElementById('pending-file').style.display = 'flex';
        };

        function clearPendingFile() {
            pendingFile = null;
            document.getElementById('file-upload').value = '';
            document.getElementById('pending-file').style.display = 'none';
        }

        // 3. Unified Send Logic
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if(!message && !pendingFile) return;

            // 1. Display user message immediately
            if(pendingFile) {
                addMessageToFeed('user', `Attached: <b>${pendingFile.name}</b><br>${message}`);
                document.getElementById('file-info').innerText = pendingFile.name;
            } else {
                addMessageToFeed('user', message);
            }
            
            input.value = '';
            const typingIndicator = document.getElementById('typing-indicator');
            typingIndicator.style.display = 'block';

            try {
                // 2. If there's a file, upload it FIRST
                if(pendingFile) {
                    typingIndicator.innerText = "Processing document...";
                    const formData = new FormData();
                    formData.append('file', pendingFile);
                    const uploadRes = await fetch(`${API_BASE}/chat/conversations/${currentConversationId}/upload`, {
                        method: 'POST',
                        body: formData
                    });
                    const uploadData = await uploadRes.json();
                    
                    // If uploading the file triggered an automatic analysis, show it!
                    if(uploadData.is_analysis) {
                        renderAnalysisBubble(uploadData.analysis_data);
                        clearPendingFile();
                        typingIndicator.style.display = 'none';
                        return; // Analysis done, no need for the separate message reply
                    }
                    clearPendingFile();
                }

                // 3. Send the message instruction
                typingIndicator.innerText = "Assistant is thinking...";
                const response = await fetch(`${API_BASE}/chat/conversations/${currentConversationId}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, stream: true })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantBubble = addMessageToFeed('assistant', '');
                let fullContent = '';

                while(true) {
                    const { value, done } = await reader.read();
                    if(done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    lines.forEach(line => {
                        if(line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if(data.type === 'delta') {
                                    fullContent += data.content;
                                    
                                    // Process markdown links and newlines
                                    let processed = fullContent.replace(/\n/g, '<br>');
                                    processed = processed.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color: #a78bfa; text-decoration: underline; font-weight: 600;">$1</a>');
                                    
                                    assistantBubble.innerHTML = processed;
                                    scrollToBottom();
                                } else if(data.type === 'analysis') {

                                    // Remove the empty bubble we were using for streaming
                                    assistantBubble.remove();
                                    renderAnalysisBubble(data.data);
                                }

                            } catch(e) {}
                        }
                    });
                }
                
                // Reload history to show new titles
                await loadHistory();
            } catch (err) {

                addMessageToFeed('assistant', "I encountered an error processing your request.");
            } finally {
                typingIndicator.style.display = 'none';
                typingIndicator.innerText = "Assistant is thinking...";
            }
        }

        function renderAnalysisBubble(analysisData) {
            const authorities = Object.keys(analysisData);
            const feed = document.getElementById('chat-feed');
            
            const bubble = document.createElement('div');
            bubble.className = 'message assistant';
            bubble.style.maxWidth = '95%';
            
            let html = `<b>Regulatory Gap Analysis Complete</b><div class="analysis-container">`;
            
            // Tabs
            html += `<div class="auth-tabs">`;
            authorities.forEach((auth, idx) => {
                html += `<div class="auth-tab ${idx === 0 ? 'active' : ''}" onclick="switchTab(this, '${auth}', '${bubble.id || (bubble.id = 'b'+Date.now())}')">${auth}</div>`;
            });
            html += `</div>`;
            
            // Results
            html += `<div class="analysis-results">`;
            const firstAuth = authorities[0];
            html += renderAuthResults(analysisData[firstAuth]);
            html += `</div></div>`;
            
            bubble.innerHTML = html;
            bubble.dataset.fullData = JSON.stringify(analysisData);
            feed.appendChild(bubble);
            scrollToBottom();
        }

        function renderAuthResults(data) {
            if(!data.gaps || data.gaps.length === 0) return `<div style="color: var(--success);">No gaps found for this authority.</div>`;
            
            return data.gaps.map(gap => `
                <div class="gap-card ${gap.severity.toLowerCase()}">
                    <div class="gap-header">
                        <div class="gap-title">${gap.title}</div>
                        <div class="severity-badge">${gap.severity}</div>
                    </div>
                    <div style="font-size: 0.85rem; color: var(--text-dim); margin-bottom: 8px;">${gap.description}</div>
                    <div style="font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px;">
                        <span style="color: var(--primary); font-weight: 600;">Recommendation:</span> ${gap.recommended_action}
                    </div>
                </div>
            `).join('');
        }

        window.switchTab = (el, auth, bubbleId) => {
            const bubble = document.getElementById(bubbleId);
            const data = JSON.parse(bubble.dataset.fullData);
            
            bubble.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            
            bubble.querySelector('.analysis-results').innerHTML = renderAuthResults(data[auth]);
        };

        // UI Helpers
        function addMessageToFeed(role, content) {
            const feed = document.getElementById('chat-feed');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            // Process markdown links and newlines
            let processed = content.replace(/\n/g, '<br>');
            processed = processed.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color: #a78bfa; text-decoration: underline; font-weight: 600;">$1</a>');
            
            div.innerHTML = processed;
            feed.appendChild(div);
            scrollToBottom();
            return div;
        }


        function scrollToBottom() {
            const feed = document.getElementById('chat-feed');
            feed.scrollTop = feed.scrollHeight;
        }

        document.getElementById('send-btn').onclick = sendMessage;
        document.getElementById('chat-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        init();
    </script>
</body>
</html>
