<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regulatory Gap Analysis | Gulfstream Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        /* Upload Area */
        .upload-card {
            background: var(--card-bg);
            border: 2px dashed #334155;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .upload-card:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            transform: translateY(-2px);
        }

        .upload-card.dragging {
            border-color: var(--accent);
            background: rgba(16, 185, 129, 0.05);
        }

        .upload-card svg {
            width: 60px;
            height: 60px;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .upload-card h3 {
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .upload-card p {
            color: var(--text-dim);
        }

        #file-input {
            display: none;
        }

        /* Status Feed */
        #status-container {
            display: none;
            margin-bottom: 30px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: #1e293b;
            border-radius: 12px;
            margin-bottom: 10px;
            animation: slideInRight 0.5s ease-out;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        .status-dot.loading {
            animation: pulse 1.5s infinite;
        }

        .status-dot.success {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        /* Results Area */
        #results {
            display: grid;
            gap: 20px;
            margin-top: 40px;
        }

        .result-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #334155;
            animation: fadeInUp 0.6s ease-out;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .severity-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .severity-high { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
        .severity-medium { background: rgba(245, 158, 11, 0.2); color: #fcd34d; }
        .severity-low { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }

        .gap-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .gap-description {
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .section-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .action-item {
            background: rgba(15, 23, 42, 0.5);
            padding: 12px 16px;
            border-radius: 10px;
            border-left: 3px solid var(--primary);
            margin-top: 15px;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid var(--primary);
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Regulatory Core</h1>
            <p class="subtitle">AI-Powered Regulatory Gap Analysis for Global Compliance</p>
        </header>

        <div class="upload-card" id="drop-zone">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z" />
            </svg>
            <h3>Upload Client Document</h3>
            <p>Drag & drop your PDF or Word file here, or click to browse</p>
            <input type="file" id="file-input" accept=".pdf,.docx,.txt">

        </div>

        <div id="status-container">
            <!-- Status items will be injected here -->
        </div>

        <div id="results">
            <!-- Results will be injected here -->
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const statusContainer = document.getElementById('status-container');
        const resultsContainer = document.getElementById('results');

        const API_BASE = 'http://localhost:8000/api/v1/regulatory';

        // Event Listeners
        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragging');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragging');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragging');
            const files = e.dataTransfer.files;
            if (files.length) handleUpload(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleUpload(e.target.files[0]);
        });

        function addStatus(message, state = 'loading') {
            statusContainer.style.display = 'block';
            const item = document.createElement('div');
            item.className = 'status-item';
            item.innerHTML = `
                <div class="status-dot ${state}"></div>
                <span>${message}</span>
            `;
            statusContainer.appendChild(item);
            return item;
        }

        async function handleUpload(file) {
            // Reset
            resultsContainer.innerHTML = '';
            statusContainer.innerHTML = '';
            
            const uploadStatus = addStatus(`Uploading ${file.name}...`);
            
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(`${API_BASE}/analysis/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Upload failed');
                
                uploadStatus.querySelector('.status-dot').className = 'status-dot success';
                addStatus('Analyzing document structure...', 'loading');
                addStatus('Searching Regulatory Knowledge Base (381 documents)...', 'loading');
                
                const data = await response.json();
                
                // Final success
                statusContainer.innerHTML = '';
                addStatus('Analysis Complete', 'success');
                
                renderResults(data);

            } catch (error) {
                console.error(error);
                addStatus(`Error: ${error.message}`, 'danger');
            }
        }

        function renderResults(data) {
            if (!data.gaps || data.gaps.length === 0) {
                resultsContainer.innerHTML = '<div class="result-card">No significant gaps found.</div>';
                return;
            }

            data.gaps.forEach(gap => {
                const card = document.createElement('div');
                card.className = 'result-card';
                
                const severityClass = gap.severity?.toLowerCase() === 'high' ? 'severity-high' : 
                                     gap.severity?.toLowerCase() === 'medium' ? 'severity-medium' : 'severity-low';

                const insight = data.insights.find(i => i.gap_id === gap.id) || {};
                const action = data.actions.find(a => a.gap_id === gap.id) || {};

                card.innerHTML = `
                    <div class="result-header">
                        <span class="severity-badge ${severityClass}">${gap.severity || 'Medium'} Severity</span>
                    </div>
                    <div class="gap-title">${gap.title}</div>
                    <div class="gap-description">${gap.description}</div>
                    
                    <div class="section-label">Requirement</div>
                    <div class="gap-description" style="font-style: italic; border-left: 2px solid #334155; padding-left: 15px;">
                        ${gap.requirement || 'Standard regulatory requirement applies.'}
                    </div>

                    <div class="section-label">AI Insight</div>
                    <div class="gap-description">${insight.content || 'Review recommended for specific compliance details.'}</div>

                    <div class="action-item">
                        <div class="section-label" style="color: var(--accent)">Recommended Action</div>
                        <div>${action.description || 'Consult with a regulatory expert to address this gap.'}</div>
                    </div>
                `;
                resultsContainer.appendChild(card);
            });
        }
    </script>
</body>
</html>
